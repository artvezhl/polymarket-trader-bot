name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: python -m pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          POLYMARKET_API_KEY: ${{ secrets.POLYMARKET_API_KEY }}
          POLYMARKET_API_SECRET: ${{ secrets.POLYMARKET_API_SECRET }}
          POLYMARKET_API_PASSPHRASE: ${{ secrets.POLYMARKET_API_PASSPHRASE }}
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: TELEGRAM_BOT_TOKEN,PRIVATE_KEY,POLYMARKET_API_KEY,POLYMARKET_API_SECRET,POLYMARKET_API_PASSPHRASE,POLYGON_RPC_URL,DEPLOY_PATH
          script: |
            set -e

            DEPLOY_DIR="${DEPLOY_PATH:-$HOME/polymarket-bot}"
            cd "$DEPLOY_DIR"

            git pull origin main

            cat > .env <<EOF
            TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
            PRIVATE_KEY=${PRIVATE_KEY}
            POLYMARKET_API_KEY=${POLYMARKET_API_KEY}
            POLYMARKET_API_SECRET=${POLYMARKET_API_SECRET}
            POLYMARKET_API_PASSPHRASE=${POLYMARKET_API_PASSPHRASE}
            POLYGON_RPC_URL=${POLYGON_RPC_URL:-https://polygon-rpc.com}
            EOF

            docker compose build --no-cache
            docker compose up -d

            sleep 5
            docker compose logs --tail=10
